<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Sagar | AI-First Full Stack Developer</title>
    <meta name="description" content="Portfolio of Sagar, an AI-First Full Stack Developer specializing in MERN stack, payment workflows, and AI tool integrations." />
    <meta name="keywords" content="Sagar, Full Stack Developer, MERN, React, Node.js, Express, MongoDB, Claude Code, Gemini, AI, Developer Portfolio" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <!-- Custom Style for Scrollbar and Global Reset -->
    <style>
      /* Smooth Scrolling and Custom Scrollbar */
      html {
        scroll-behavior: smooth;
      }
      /* Custom scrollbar styling in warm earth colors */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #FAF7F2;
      }
      .dark ::-webkit-scrollbar-track {
        background: #1F150A;
      }
      ::-webkit-scrollbar-thumb {
        background: #C4A882;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #8B6914;
      }
    </style>
  </head>
  <body class="bg-brown-50 text-brown-900 font-sans transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
